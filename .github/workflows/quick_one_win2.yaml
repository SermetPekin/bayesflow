
name: Multi-Backend Tests

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

defaults:
  run:
    shell: bash


jobs:
  test:
    name: Run Multi-Backend Tests

    strategy:
      matrix:
        os: [windows-latest] # , 
        python-version: ["3.10"]  # we usually only need to test the oldest python version
        backend: ["tensorflow"] # "jax", "torch"

    runs-on: ${{ matrix.os }}

    env:
      KERAS_BACKEND: ${{ matrix.backend }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install -U pip setuptools wheel
          pip install .[test]

      - name: Install JAX
        if: ${{ matrix.backend == 'jax' }}
        run: |
          pip install -U jax

      - name: Install TensorFlow
        if: ${{ matrix.backend == 'tensorflow' }}
        run: |
          pip install -U tensorflow

      - name: Install PyTorch
        if: ${{ matrix.backend == 'torch' }}
        run: |
          pip install -U torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Show Environment Info
        run: |
          python --version
          pip --version
          printenv | sort
          pip list

      - name: Run Tests
        run: |
          pytest tests/test_approximators/test_approximator_standardization/test_approximator_standardization.py::test_save_and_load[standardize='all'] -v 

